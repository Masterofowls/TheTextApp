# MoQ relay — deploy: cd infra/fly/moq-relay && fly deploy
# Relay URL: https://thetextapp-moq.fly.dev/anon (cert via API proxy)

app = "thetextapp-moq"
primary_region = "lhr"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[deploy]
  strategy = "rolling"

[env]
  RUST_LOG = "info"

[[services]]
  protocol = "udp"
  internal_port = 443
  [[services.ports]]
    port = 443

[[services]]
  protocol = "tcp"
  internal_port = 443
  [[services.ports]]
    port = 443

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
