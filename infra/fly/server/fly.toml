# Build: fly deploy . -a thetextapp-api --dockerfile infra/fly/server/Dockerfile -c infra/fly/server/fly.toml

app = "thetextapp-api"
primary_region = "lhr"
kill_signal = "SIGINT"
kill_timeout = "10s"

[env]
  PORT = "8080"
  NODE_ENV = "production"
  DB_POOL_SIZE = "3"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
