name: Android — build release APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPO_PUBLIC_API_URL: https://thetextapp-api.fly.dev
  EXPO_PUBLIC_MOQ_RELAY_URL: https://thetextapp-moq.fly.dev/anon
  APK_PATH: dist/android/thetextapp-release.apk

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Restore release keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            mkdir -p infra/android
            echo "$KEYSTORE_B64" | base64 -d > infra/android/thetextapp-release.keystore
            echo "Using keystore from ANDROID_KEYSTORE_BASE64 secret"
          fi

      - name: Build signed release APK
        run: bash scripts/build-android.sh
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || env.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_MOQ_RELAY_URL: ${{ vars.EXPO_PUBLIC_MOQ_RELAY_URL || env.EXPO_PUBLIC_MOQ_RELAY_URL }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_KEY }}
          THETEXTAPP_KEYSTORE: ${{ github.workspace }}/infra/android/thetextapp-release.keystore
          THETEXTAPP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          THETEXTAPP_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          THETEXTAPP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Prepare release assets
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          sha256sum "$APK_PATH" > dist/android/thetextapp-release.apk.sha256
          ls -lh dist/android/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: thetextapp-release-apk
          path: |
            dist/android/thetextapp-release.apk
            dist/android/thetextapp-release.apk.sha256
          if-no-files-found: error

      - name: Resolve release tag
        id: release
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "name=TheTextApp $TAG" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=apk-latest" >> "$GITHUB_OUTPUT"
            echo "name=TheTextApp Android APK (latest)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove previous rolling release
        if: steps.release.outputs.tag == 'apk-latest'
        run: |
          gh release delete apk-latest --yes 2>/dev/null || true
          git push origin :refs/tags/apk-latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          make_latest: true
          generate_release_notes: true
          files: |
            dist/android/thetextapp-release.apk
            dist/android/thetextapp-release.apk.sha256
          body: |
            ## TheTextApp Android APK

            | | |
            |---|---|
            | **App version** | `${{ env.APP_VERSION }}` |
            | **CI build** | `#${{ github.run_number }}` |
            | **Commit** | `${{ github.sha }}` |
            | **Ref** | `${{ github.ref_name }}` |

            ### Install

            1. Download `thetextapp-release.apk` below
            2. On Android, allow installs from unknown sources if prompted
            3. Open the APK to install

            Verify with `thetextapp-release.apk.sha256` if needed.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
