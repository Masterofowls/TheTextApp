name: Android — build release APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPO_PUBLIC_API_URL: https://thetextapp-api.fly.dev
  EXPO_PUBLIC_MOQ_RELAY_URL: https://thetextapp-moq.fly.dev/anon

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build signed release APK
        run: bash scripts/build-android.sh
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || env.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_MOQ_RELAY_URL: ${{ vars.EXPO_PUBLIC_MOQ_RELAY_URL || env.EXPO_PUBLIC_MOQ_RELAY_URL }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_KEY }}
          THETEXTAPP_KEYSTORE: ${{ github.workspace }}/infra/android/thetextapp-release.keystore
          THETEXTAPP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'thetextapp' }}
          THETEXTAPP_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'thetextapp' }}
          THETEXTAPP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'thetextapp' }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: thetextapp-release-apk
          path: dist/android/thetextapp-release.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/android/thetextapp-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
